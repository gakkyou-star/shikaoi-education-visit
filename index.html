<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鹿追町教育委員会 視察説明資料</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --main: #1a7a8a;
      --dark: #135f6d;
      --accent: #e85d04;
      --bg: #f7fafc;
      --text: #1a202c;
      --border: #cbd5e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a3a5c 0%, #1a7a8a 60%, #2a9db0 100%);
      color: white;
      padding: 48px 24px 40px;
      text-align: center;
    }
    header .subtitle {
      font-size: 14px;
      letter-spacing: 0.15em;
      opacity: 0.8;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    header h1 {
      font-size: clamp(22px, 5vw, 36px);
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1.3;
      margin-bottom: 16px;
    }
    header p {
      font-size: 15px;
      opacity: 0.85;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--main);
      text-transform: uppercase;
      margin-bottom: 24px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
    }
    .card-header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
    }
    .card-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }
    .card-tag.ib {
      background: #e6f3f5;
      color: var(--main);
    }
    .card-tag.intl {
      background: #fff3e6;
      color: #c05a00;
    }
    .card h2 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 10px;
    }
    .card p {
      font-size: 13px;
      color: #4a5568;
      line-height: 1.6;
    }
    .card-footer {
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fafafa;
    }
    .card-footer span {
      font-size: 13px;
      color: #718096;
    }
    .card-footer .arrow {
      font-size: 18px;
      color: var(--main);
      font-weight: 700;
    }
    footer {
      text-align: center;
      padding: 32px 16px;
      font-size: 13px;
      color: #718096;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="subtitle">Shikaoi Town Board of Education</div>
    <h1>鹿追町教育委員会<br>視察説明資料</h1>
    <p>各資料を選択してご覧ください</p>
  </header>
  <main>
    <div class="section-title">資料一覧 — Documents</div>
    <div class="cards">
      <a class="card" href="%E5%9B%BD%E9%9A%9B%E4%BA%A4%E6%B5%81%E8%A6%96%E5%AF%9F%E8%B3%87%E6%96%99_web.html">
        <div class="card-header">
          <span class="card-tag intl">国際交流・一貫教育</span>
          <h2>鹿追町の国際交流と<br>幼小中高一貫教育</h2>
          <p>鹿追町における国際交流の取組と幼小中高一貫教育体制に関する説明資料です。</p>
        </div>
        <div class="card-footer">
          <span>国際交流視察資料_web.html</span>
          <span class="arrow">→</span>
        </div>
      </a>
      <a class="card" href="IB%E8%A6%96%E5%AF%9F%E8%B3%87%E6%96%99.html">
        <div class="card-header">
          <span class="card-tag ib">IB教育</span>
          <h2>鹿追町 IB教育<br>視察資料 2026</h2>
          <p>国際バカロレア（IB）プログラムの導入・実践に関する説明資料です。</p>
        </div>
        <div class="card-footer">
          <span>IB視察資料.html</span>
          <span class="arrow">→</span>
        </div>
      </a>
    </div>
  </main>
  <footer>
    &copy; 2026 鹿追町教育委員会
  </footer>
</body>
</html>
